# rules.yaml — Reglas de composición del grupo: always / never / prefer.
# SUSTITUYE a staples.yaml (superseded 2026-07-14): sus auto_includes viven
# ahora como `always` y su lista `preferred` migra tal cual (hoy vacía).
#
# Editable a mano. Lo carga backend/selector/deck_rules.py (load_rules) y lo
# consumen ambos selectores (greedy y CP-SAT).
#
# ÁMBITO: SOLO cartas no-tierra. Las tierras son territorio del módulo de
# manabase (Karsten) y NUNCA se fuerzan desde aquí.
#
# Precedencia estricta: ban > never > always > prefer.
#   - La banlist (banlist.yaml) SIEMPRE gana: una carta baneada jamás entra,
#     aunque tenga regla always.
#   - Si una carta matchea a la vez un never y un always, gana el never.
#
# Predicados `when` v1 — SOLO hechos conocidos ANTES de la selección:
#   color_identity_contains: [W|U|B|R|G]   -> la identidad del comandante
#                                             contiene TODOS los colores listados
#   color_identity_size: 2 | ">=2" | "<=1" -> tamaño de la identidad (entero
#                                             exacto o comparador como string)
#   archetype_in / archetype_not_in: [...] -> arquetipo de cuotas del mazo
#                                             (validado contra quotas.yaml)
#   commander_in / commander_not_in: [...] -> nombre exacto del comandante
#   any_of: [ {...}, {...} ]               -> OR de sub-bloques; el resto de
#                                             claves de un bloque van en AND
# Predicados sobre el mazo YA construido (creature_count, deck_*...) quedan
# FUERA de v1: el loader los rechaza con error de schema.
#
# [ADAPTACIÓN] `commander_in` es extensión nuestra: no existe un arquetipo
# "artifacts" en quotas.yaml, así que el caso "monocolor de temática de
# artefactos" (Arcane Signet en Urza/Emry) se codifica listando comandantes.

meta:
  version: "1.0-draft"
  status: draft            # pendiente de revisión del grupo
  updated: "2026-07-14"
  # Presupuesto de slots forzados: nº máximo de always que pueden matchear a
  # un MISMO comandante legal. El validador (deck_rules.validate_forced_slot_budget)
  # FALLA si algún comandante lo supera.
  # Rediseño 2026-07-14 ("test del olvido", acordado con Guille): always solo
  # para cartas (1) incondicionales en su identidad, (2) cuya ausencia sería un
  # olvido y no una elección, y (3) que escalen bien al sumar colores. Solo
  # Sol Ring y Arcane Signet lo pasan; el resto de staples viven en `preferred`
  # con boost fuerte (0.4) — aparecen por mérito subvencionado, no forzadas.
  # Peor caso real hoy: 2 always por mazo; budget 4 deja hueco a nominaciones.
  forced_slot_budget: 4
  notes: >
    Sustituye a staples.yaml. Cada always consume el slot de su
    quota_category (no va por encima de las 99); un never no se
    auto-recomienda ni aparece en el maybeboard; un prefer solo suma bonus
    de score.

# Bloque documental: la app honra estas semánticas (selectores hoy; el
# validador RED/AMBER llega en Fase 4).
semantics:
  precedence: [ban, never, always, prefer]
  always: >
    La carta DEBE estar en las 99 si su `when` matchea (sin `when` =
    incondicional). Consume slot de su `quota_category` como cualquier otra
    carta — nunca por encima de 99. `quota_category: null` = sin categoría de
    cuota asignada en v1 (consume slot de relleno general).
  never: >
    Si su `when` matchea, la carta nunca es auto-recomendada: ni mainboard ni
    maybeboard (mismo tratamiento que la watchlist de banlist.yaml).
  prefer: >
    Bonus plano de score cuando la identidad del mazo incluye alguno de los
    colores de `colors_any` (lista vacía = todos los mazos). No es una
    constraint: nunca fuerza la entrada.
  user_override:
    ban: "RED — no overrideable por el usuario."
    remove_always: "AMBER — quitar un always a mano: el mazo sigue siendo válido y exportable."
    add_never_manually: "AMBER — añadir a mano una carta never: válido."

# ---------------------------------------------------------------------------
# ALWAYS — entran sí o sí cuando su `when` matchea (y no están baneadas).
# quota_category traducida del spec a nuestras categorías:
#   spot_removal -> removal | interaction -> removal | board_wipe -> board_wipe
#   ramp -> ramp | protection -> null (no existe categoría; pendiente:
#   categoría protection, decisión de Guille futura).
# ---------------------------------------------------------------------------
always:
  # ── incoloras ────────────────────────────────────────────────────────────
  - name: Sol Ring
    quota_category: ramp
    # Sin `when`: en todos los mazos.

  - name: Arcane Signet
    quota_category: ramp
    when:
      any_of:
        - color_identity_size: ">=2"
        # [ADAPTACIÓN] monocolor de temática de artefactos, vía commander_in
        # (no hay arquetipo "artifacts" en quotas.yaml).
        - commander_in:
            - "Urza, Lord High Artificer"
            - "Emry, Lurker of the Loch"

  # (Rediseño 2026-07-14: el resto de staples del seed original — Swords,
  # Path, counters, free spells, Cyclonic Rift, Toxic Deluge, Chaos Warp,
  # Deadly Rollick — bajaron a `preferred` 0.4: ninguna pasa el test del
  # olvido en TODOS los mazos de su color. Erode y Blasphemous Act salieron
  # del seed: la primera debe ganarse el slot por score; la segunda ya
  # delataba con su excepción de arquetipo que no era un always.)

# ---------------------------------------------------------------------------
# NEVER — nunca auto-recomendadas (ni mainboard ni maybeboard) si matchean.
# ---------------------------------------------------------------------------
never:
  - name: Arcane Signet
    # [ADAPTACIÓN] "<=1" en vez del "1" del spec: en identidad incolora el
    # Signet no produce maná (misma razón que en monocolor sin temática).
    when:
      color_identity_size: "<=1"
      commander_not_in:
        - "Urza, Lord High Artificer"
        - "Emry, Lurker of the Loch"
    reason: >
      En monocolor sin temática de artefactos (y en incoloro) hay rocas
      estrictamente mejores; fuera de las excepciones listadas no debe
      recomendarse.

# ---------------------------------------------------------------------------
# PREFER — staples "permitidas" por color: bonus plano de score, jamás
# fuerzan su entrada. Formato:
#   - name: Solemn Simulacrum
#     colors_any: []        # vacío = cualquier mazo
#     boost: 0.3            # opcional (default 0.3)
# Dos niveles (2026-07-14):
#   0.4 — staples de color del seed original de always: casi siempre entran,
#         pero un mazo con mejor uso del slot puede prescindir (caso Ur-Dragon:
#         no arrastra todos los free spells si no protege un plan de campo).
#   0.2 — ciclos Signet/Talismán por pareja de colores.
# Nota: solo aparecen como candidatas en páginas EDHREC de sus colores.
# ---------------------------------------------------------------------------
preferred:
  - { name: Swords to Plowshares, colors_any: [W], boost: 0.4 }
  - { name: Path to Exile, colors_any: [W], boost: 0.4 }
  - { name: Flawless Maneuver, colors_any: [W], boost: 0.4 }
  - { name: Counterspell, colors_any: [U], boost: 0.4 }
  - { name: Mana Drain, colors_any: [U], boost: 0.4 }
  - { name: Force of Will, colors_any: [U], boost: 0.4 }
  - { name: Fierce Guardianship, colors_any: [U], boost: 0.4 }
  - { name: Cyclonic Rift, colors_any: [U], boost: 0.4 }
  - { name: Deadly Rollick, colors_any: [B], boost: 0.4 }
  - { name: Toxic Deluge, colors_any: [B], boost: 0.4 }
  - { name: Chaos Warp, colors_any: [R], boost: 0.4 }
  - { name: Deflecting Swat, colors_any: [R], boost: 0.4 }
  - { name: Azorius Signet, colors_any: [W, U], boost: 0.2 }
  - { name: Dimir Signet, colors_any: [U, B], boost: 0.2 }
  - { name: Rakdos Signet, colors_any: [B, R], boost: 0.2 }
  - { name: Gruul Signet, colors_any: [R, G], boost: 0.2 }
  - { name: Selesnya Signet, colors_any: [G, W], boost: 0.2 }
  - { name: Orzhov Signet, colors_any: [W, B], boost: 0.2 }
  - { name: Izzet Signet, colors_any: [U, R], boost: 0.2 }
  - { name: Golgari Signet, colors_any: [B, G], boost: 0.2 }
  - { name: Boros Signet, colors_any: [R, W], boost: 0.2 }
  - { name: Simic Signet, colors_any: [G, U], boost: 0.2 }
  - { name: Talisman of Progress, colors_any: [W, U], boost: 0.2 }
  - { name: Talisman of Dominance, colors_any: [U, B], boost: 0.2 }
  - { name: Talisman of Indulgence, colors_any: [B, R], boost: 0.2 }
  - { name: Talisman of Impulse, colors_any: [R, G], boost: 0.2 }
  - { name: Talisman of Unity, colors_any: [G, W], boost: 0.2 }
  - { name: Talisman of Hierarchy, colors_any: [W, B], boost: 0.2 }
  - { name: Talisman of Creativity, colors_any: [U, R], boost: 0.2 }
