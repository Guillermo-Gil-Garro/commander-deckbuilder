# banlist.yaml — Commander Deckbuilder
# Fuente única de verdad de la banlist del grupo.
# Resolución de cartas: por nombre EXACTO contra el bulk data de Scryfall.
# El pipeline debe resolver cada nombre a su oracle_id en build time y FALLAR
# si un nombre no matchea exactamente 1 carta (ojo: "The Mind Stone" (Marvel)
# vs "Mind Stone" (roca clásica) — nunca matchear por substring).
# Cartas multicara: resolución en dos pasos, siempre por igualdad exacta.
# 1) nombre completo Scryfall ("A // B"); 2) solo si no hay match, nombre
# exacto de una cara ("Tergrid, God of Fright"). El orden importa: existe
# "Emeritus of Woe // Demonic Tutor", pero "Demonic Tutor" resuelve al tutor
# clásico por el paso 1. Ambigüedad en cualquier paso -> FALLAR.

meta:
  version: "1.0-rc"
  status: pending_group_review   # cambiar a "active" tras revisión de Guille + grupo
  updated: "2026-07-12"
  review_cycle: quarterly
  notes: >
    Los bans oficiales de WotC se asumen aparte (campo `legalities.commander`
    de Scryfall). Este archivo solo contiene las decisiones propias del grupo.

# Estados posibles:
#   banned                -> ilegal en el mazo
#   banned_as_commander   -> oculto del selector de comandantes; legal en las 99
#   banned_pending_review -> ban temporal con condición de revisión
#   watchlist             -> legal, pero NUNCA auto-recomendada por el sistema;
#                            solo añadible manualmente desde el maybeboard

# ---------------------------------------------------------------------------
# Reglas programáticas (se evalúan contra el pool completo; sobreviven a sets
# nuevos sin tocar la enumeración)
# ---------------------------------------------------------------------------
rules:
  - id: generic_tutor_game_changer
    status: banned
    predicate: "is_generic_tutor AND scryfall.game_changer == true"
    reason: >
      Tutores genéricos a mano/top van contra la filosofía singleton:
      convierten las 99 en "las 10 que importan". Los tutores de categoría
      estrecha y on-theme siguen legales.
    resolved_cards:  # snapshot 2026-07-12; regenerar en cada update del bulk data
      - Demonic Tutor
      - Vampiric Tutor
      - Imperial Seal
      - Mystical Tutor
      - Enlightened Tutor
      - Worldly Tutor
      - Gamble
      - Gifts Ungiven
      - Intuition
    exceptions:
      - name: Natural Order
        reason: "Tutor de criatura = categoría estrecha. Decisión de grupo 2026-07-12."
      - name: Survival of the Fittest
        reason: "Tutor de criatura = categoría estrecha. Decisión de grupo 2026-07-12."
      - name: Crop Rotation
        reason: "Tutor de tierras = ramp, categoría estrecha legal."

  - id: infinity_stones
    status: banned_pending_review
    predicate: "type_line CONTAINS 'Infinity Stone'"
    reason: >
      Solo existen 2 de 6 stones (blanca y negra): desequilibra en favor de
      W/B. Se revisa el pack completo cuando estén publicadas las seis.
    review_condition: "las 6 Infinity Stones publicadas"
    resolved_cards:  # snapshot 2026-07-12
      - The Soul Stone
      - The Mind Stone

# ---------------------------------------------------------------------------
# Bans manuales (carta a carta)
# ---------------------------------------------------------------------------
cards:
  - name: Rhystic Study
    status: banned
    reason: "Auto-include azul; ventaja pasiva que castiga jugar Magic."
  - name: Smothering Tithe
    status: banned
    reason: "Auto-include blanco; ventaja pasiva que castiga jugar Magic."
  - name: Esper Sentinel
    status: banned
    reason: "Rhystic Study con patas; completa el trío de taxes pasivos."
  - name: Mystic Remora
    status: banned
    reason: "Rhystic pequeño; mismo patrón de tax pasivo."
  - name: The One Ring
    status: banned
    reason: "Ventaja genérica incolora; va en cualquier mazo."
  - name: Thassa's Oracle
    status: banned
    reason: "Final no-juego. WotC lo tiene en consideración de ban oficial."
    reason_group: alt_win_empty_library
  - name: Laboratory Maniac
    status: banned
    reason: >
      Condición de victoria alternativa que convierte biblioteca vacía en
      victoria instantánea; banear solo Thassa's Oracle dejaba la línea
      idéntica abierta.
    reason_group: alt_win_empty_library
  - name: Jace, Wielder of Mysteries
    status: banned
    reason: >
      Condición de victoria alternativa que convierte biblioteca vacía en
      victoria instantánea; banear solo Thassa's Oracle dejaba la línea
      idéntica abierta.
    reason_group: alt_win_empty_library
  - name: Doctor Doom, Unrivaled
    status: banned
    reason: >
      Mismo alt-win de biblioteca vacía que Oracle/Lab Man/Jace; se cierra el
      patrón entero (único superviviente detectado en el escaneo 2026-07-14).
    reason_group: alt_win_empty_library
  - name: Demonic Consultation
    status: banned
    reason: >
      Vaciador de biblioteca: enabler directo de la línea alt-win y búsqueda
      genérica brutal incluso sin ella. La regla de tutores no la captura
      (no es tutor a mano).
    reason_group: alt_win_empty_library
  - name: Tainted Pact
    status: banned
    reason: "Ídem Demonic Consultation."
    reason_group: alt_win_empty_library
  - name: Drannith Magistrate
    status: banned
    reason: "Apaga la command zone de toda la mesa."
  - name: Grim Tutor
    status: banned
    reason: >
      Tutor genérico a mano; no está en Game Changers así que la regla
      programática no lo captura. Ban manual por definición de criterio.

# ---------------------------------------------------------------------------
# Comandantes ocultos del selector (legales en las 99)
# ---------------------------------------------------------------------------
commanders:
  - name: Yuriko, the Tiger's Shadow
    status: banned_as_commander
    reason: "El mazo se construye solo; daño gratis ineludible desde la command zone."
  - name: Tergrid, God of Fright
    status: banned_as_commander
    reason: >
      Cada simetría de descarte/sacrificio se vuelve robo asimétrico
      garantizado. Miserable para la mesa y para quien la pilota
      (experiencia de primera mano). Vigilar también en las 99 (ver watchlist).
  - name: Vivi Ornitier
    status: banned_as_commander
    reason: >
      Motor de maná escalable siempre accesible; el mazo Izzet spellslinger
      se construye solo. En las 99 es una criatura buena que muere a removal.

# ---------------------------------------------------------------------------
