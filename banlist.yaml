  - name: Jin-Gitaxias, Core Augur
    reason: "Legal hasta que alguien se queje (acuerdo explícito de grupo)."
  - name: Tergrid, God of Fright
    scope: in_the_99
    reason: "Con paquete de descarte sigue siendo un 80% de miserable aun sin ser comandante."

# ---------------------------------------------------------------------------
# Explícitamente legales (para que conste en acta; evita reabrir debates)
# ---------------------------------------------------------------------------
explicitly_legal:
  - { name: Stasis, note: "El stax no nos disgusta." }
  - { name: Winter Orb, note: "Ídem." }
  - { name: Static Orb, note: "Ídem." }
  - { name: Armageddon, note: "MLD legal; decisión estratégica legítima." }
  - { name: Orcish Bowmasters, note: "Se considera interacción." }
  - { name: Jeska's Will, note: "No se nota en mesa." }
  - { name: Cyclonic Rift, note: "Respuesta; aceptada." }
  - { name: Deflecting Swat, note: "Aceptada (WotC la sacó de Game Changers 10/2025)." }
  - { name: Fierce Guardianship, note: "Aceptada." }
  - { name: Teferi's Protection, note: "Free spells aceptados en bloque." }
  - { name: Blood Moon, note: "Stax de tierras; coherencia con pro-stax." }
  - { name: Back to Basics, note: "Ídem." }
  - { name: Crop Rotation, note: "Excepción a regla de tutores (tierras = ramp)." }
  - { name: Natural Order, note: "Excepción a regla de tutores (criaturas = estrecho)." }
  - { name: Survival of the Fittest, note: "Excepción a regla de tutores." }
  - category: extra_turns
    note: "Ningún turno extra baneado; anti-abuso vía cuota (max 2 en la categoría)."
  - category: mass_land_destruction
    note: "Legal sin regla social; que la mesa aprenda a no girarlo todo."

# ---------------------------------------------------------------------------
# Regla de banlist viva
# ---------------------------------------------------------------------------
nomination_rule:
  who: "cualquier jugador, tras una partida"
  cooldown: "voto en frío, mínimo 1 día después"
  threshold: "mayoría simple"
  effect: "ban hasta la siguiente revisión trimestral"
  logging: >
    El historial de nominaciones se persiste: es señal directa para el
    ajuste de cuotas del recomendador.
