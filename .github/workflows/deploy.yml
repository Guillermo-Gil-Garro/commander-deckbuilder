name: Deploy to HF Space

# GitHub is the source of truth; this deploys it to the Hugging Face Space.
# Every run regenerates the data (card pool, EDHREC ranking, featured precache)
# and then ships, so the Space always gets fresh data — new sets and drifting
# inclusion %s — without anyone running a command, and a code push never reverts
# a weekly refresh. The regenerated pool is force-added for the HF push only,
# never committed back to GitHub, so GitHub's LFS never grows. New cards arrive
# untagged (they fall to `synergy`) until the LLM tagging phase; accepted.
#
# Triggers: push to main (deploy code), weekly cron (scheduled refresh), and
# manual dispatch. A run takes a few minutes (it downloads the Scryfall bulk).
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch: {}

# Never let two deploys race the Space's git history.
concurrency:
  group: deploy-hf
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          # Full history: HF rejects a shallow push ("shallow update not allowed").
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install the backend (for the data pipeline)
        run: pip install -e ./backend

      - name: Regenerate data (pool, ranking, featured precache)
        run: |
          set -e
          # New Commander-legal cards from any set released since the last run.
          (cd backend && python -m pipeline.build)
          # Fresh commander popularity ranking.
          python scripts/precache_edhrec_ranking.py
          # Re-precache the featured pages; best-effort (on-demand + the TTL
          # cover freshness anyway, and a transient EDHREC hiccup must not block
          # the deploy).
          python scripts/precache_edhrec.py || true
          git config user.name "deckbuilder-bot"
          git config user.email "deckbuilder-bot@users.noreply.github.com"
          git add -f data/processed/cards.jsonl data/edhrec_ranking.json \
                     data/cache/edhrec/*--optimized.json
          git commit -m "chore(data): refresh (pool, ranking, precache)" \
            || echo "No data changes."

      - name: Push to the Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.COMMANDER_DECKBUILDER_HF_SPACE }}
        run: |
          git lfs install
          git push \
            "https://Caskis:${HF_TOKEN}@huggingface.co/spaces/Caskis/commander-deckbuilder" \
            HEAD:main --force
