# featured_commanders.yaml — Comandantes ofrecidos prioritariamente en la UI.
# Lista decidida por Guille (2026-07-12). Independiente de quotas.yaml (cuotas
# individualizadas) y de banlist.yaml (ninguno de estos puede estar
# banned_as_commander — el loader debe validarlo).
# Resolución de nombres: misma regla de dos pasos que banlist.yaml.
#
# `description` (2026-07-15): una frase para el hover del picker, dirigida a
# quien NO conoce la carta. Dice QUÉ HACE EL MAZO, no repite el oracle text
# (el picker ya pinta la carta entera). Máximo ~90 caracteres.

featured:
  # Mono / incoloro
  - name: Giada, Font of Hope              # W
    description: "Rampa blanca para desplegar ángeles enormes y ganar por el aire."
  - name: Urza, Lord High Artificer        # U
    description: "Convierte tus artefactos en maná y en un Construct gigante."
  - name: Baral, Chief of Compliance       # U
    description: "Contramagia barata: dices que no a todo y robas mientras tanto."
  - name: Talrand, Sky Summoner            # U
    description: "Cada hechizo te regala un dragón; ganas con un ejército volador."
  - name: Bruvac the Grandiloquent         # U
    description: "Duplica el molido y vacía las bibliotecas rivales."
  - name: Emry, Lurker of the Loch         # U
    description: "Relanza artefactos desde tu cementerio, turno tras turno."
  - name: Sephiroth, Fabled SOLDIER        # B
