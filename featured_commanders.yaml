  - name: K'rrik, Son of Yawgmoth          # B
    description: "Paga con vida en vez de maná y lanza hechizos negros enormes ya."
  - name: Krenko, Mob Boss                 # R
    description: "Fabrica hordas de goblins y los convierte en daño masivo de golpe."
  - name: Azusa, Lost but Seeking          # G
