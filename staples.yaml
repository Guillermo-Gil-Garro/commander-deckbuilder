# staples.yaml — Staples y auto-includes del grupo (decisión 2026-07-14).
# Editable a mano. Lo carga backend/selector/staples.py (load_staples) y lo
# consumen ambos selectores (greedy y CP-SAT).
#
# auto_includes: entran SIEMPRE al mainboard si su condición aplica, si pasan
#   la identidad de color del comandante y si no están baneadas (la banlist
#   SIEMPRE gana; si la condición no aplica, la carta NO entra). Cuentan en
#   sus categorías de cuota como cualquier otra carta y el relleno nunca las
#   desplaza.
#
#   Condiciones disponibles:
#     always                     -> en todos los mazos.
#     multicolor_or_listed_mono  -> en todo mazo de 2+ colores; en monocolor
#                                   SOLO si el comandante aparece en
#                                   mono_exceptions (p. ej. temática de
#                                   artefactos). En ningún otro monocolor.
#
# preferred: staples "permitidas" por color. NO fuerzan su entrada: suman un
#   bonus plano al score (boost, por defecto 0.3) cuando la identidad del
#   mazo incluye ALGUNO de los colores de colors_any (lista vacía = aplica a
#   cualquier mazo, p. ej. staples incoloras). Formato de cada entrada:
#
#     - name: Swords to Plowshares
#       colors_any: [W]
#       boost: 0.3          # opcional (default 0.3)
#
#   (Lista pendiente: Guille la rellenará desde otra sesión.)

auto_includes:
  - name: Sol Ring
    condition: always
  - name: Arcane Signet
    condition: multicolor_or_listed_mono
    mono_exceptions:
      - Urza, Lord High Artificer
      - Emry, Lurker of the Loch

preferred: []
