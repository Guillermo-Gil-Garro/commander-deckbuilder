# quotas.yaml — Cuotas por arquetipo y diales de usuario (Commander, mazo de 99).
# Fuente única de verdad para el resolver de bandas Y para la UI de diales.
# Diseño aprobado: docs/CUOTAS_PROPUESTA.md (2026-07-12).
#
# Formato de banda: [min, max], ambos inclusive.
# `synergy` es SOLO techo: se escribe como un entero y su min es siempre 0
# (el resto del mazo ES el paquete de sinergia; el techo evita el mazo-tema-total).
#
# El suelo Karsten de tierras NO vive aquí: se calcula siempre sobre el mazo
# actual y es infranqueable — el min efectivo de `lands` es
# max(min_banda, suelo_karsten). El dial low puede acercar la banda al suelo,
# nunca cruzarlo.

defaults:
  archetype: midrange

archetypes:
  midrange:            # fallback generalista
    lands: [34, 39]    # min bajado 2026-07-14: el suelo Karsten es quien debe mandar
    ramp: [9, 14]
    card_draw: [9, 12]
    removal: [8, 13]
    board_wipe: [3, 5]
    wincons: [2, 4]
    synergy: 28

  aggro:               # aggro / go-wide
    lands: [33, 36]
    ramp: [7, 12]
    card_draw: [8, 11]
    removal: [6, 11]
    board_wipe: [1, 3]
    wincons: [0, 4]    # min 0 (2026-07-14): en aggro el ejército ES la wincon
    synergy: 35

  control:             # control / stax
    lands: [36, 40]
    ramp: [10, 15]
    card_draw: [10, 14]
    removal: [10, 16]
    board_wipe: [4, 6]
    wincons: [1, 3]
    synergy: 20

  spellslinger:
    lands: [34, 37]
    ramp: [8, 13]
    card_draw: [10, 14]
    removal: [8, 14]
    board_wipe: [2, 4]
    wincons: [2, 4]
    synergy: 30

  voltron:             # la wincon es el comandante; equipos/auras viven en synergy
    lands: [34, 37]
    ramp: [8, 13]
    card_draw: [9, 12]
    removal: [7, 12]
    board_wipe: [1, 3]
    wincons: [0, 2]
    synergy: 30

  graveyard:           # motor de tumba
    lands: [34, 38]    # min bajado 2026-07-14: el suelo Karsten es quien debe mandar
    ramp: [8, 13]
    card_draw: [9, 13]
    removal: [7, 12]
    board_wipe: [2, 4]
    wincons: [2, 4]
    synergy: 30

  enchantress:         # encantamientos-matter (Sythis); robo alto vía enchantresses
    lands: [34, 37]
    ramp: [8, 13]
    card_draw: [10, 14]
    removal: [8, 13]
    board_wipe: [2, 4]
    wincons: [1, 3]
    synergy: 32

  lands_matter:
    lands: [38, 42]
    ramp: [12, 18]
    card_draw: [9, 12]
    removal: [6, 11]
    board_wipe: [2, 4]
    wincons: [2, 4]
    synergy: 18

# Diales de la UI: desplazan la banda resultante ±delta (low resta, high suma).
# `synergy` solo mueve el techo (el min queda fijo en 0). La posición central
# es el punto de partida y no lleva frase. Sin dial para `wincons`.
dials:
  lands:
    delta: 3
    low: "Mamá se llevó las tierras, qué caradura..."
    high: "¡MOZÁ! ¡TENGO TIERRAS!"
  ramp:
    delta: 3
    low: "курва (kurwa para los que no leen cirílico)"
    high: "It's raining lands! Hallelujah! It's raining lands!"
  card_draw:
    delta: 3
    low: "Topdicker"
    high: "Piggyhands"
  removal:
    delta: 3
    low: "Soy pecifista"
    high: "¡Voy a matar a Moe! Weeeee"
  board_wipe:
    delta: 2
    low: "Mi gente, tamo en japón. ¡Gente con cojone!"
    high: "50.000 people used to live here... now it's a ghost town."
  synergy:
    delta: 6
    low: "5C goodstuff"
    high: "Technologia!"

# Overrides por comandante (los añade Guille a mano). Pisa categorías sueltas,
# no el bloque entero. Formato:
#
#   "Krenko, Mob Boss":
#     archetype: aggro
#   "Atraxa, Praetors' Voice":
#     archetype: midrange
#     overrides:
#       card_draw: [10, 14]    # pisa solo esa categoría
#       synergy: 32            # techo: entero, como en los arquetipos
commanders:
  "Krenko, Mob Boss":
    archetype: aggro
  "Meren of Clan Nel Toth":
    archetype: graveyard
  "Niv-Mizzet, Parun":
    archetype: spellslinger
  "Sythis, Harvest's Hand":
    archetype: enchantress
  "Omnath, Locus of Creation":
    archetype: lands_matter
