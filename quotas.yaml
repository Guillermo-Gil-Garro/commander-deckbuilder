# quotas.yaml — Cuotas por arquetipo y diales de usuario (Commander, mazo de 99).
# Fuente única de verdad para el resolver de bandas Y para la UI de diales.
# Diseño aprobado: docs/CUOTAS_PROPUESTA.md (2026-07-12).
#
# Formato de banda: [min, max], ambos inclusive.
# `synergy` es SOLO techo: se escribe como un entero y su min es siempre 0
# (el resto del mazo ES el paquete de sinergia; el techo evita el mazo-tema-total).
#
# El suelo Karsten de tierras NO vive aquí: se calcula siempre sobre el mazo
# actual y es infranqueable — el min efectivo de `lands` es
# max(min_banda, suelo_karsten). El dial low puede acercar la banda al suelo,
# nunca cruzarlo.
#
# `protection` añadida 2026-07-14 (decisión de Guille; recomendada por el
# informe B4): bandas iniciales, calibrar con datos. Sin dial (como wincons).

defaults:
  archetype: midrange

archetypes:
  midrange:            # fallback generalista
    lands: [34, 39]    # min bajado 2026-07-14: el suelo Karsten es quien debe mandar
    ramp: [9, 14]
    card_draw: [9, 12]
    removal: [8, 13]
    board_wipe: [3, 5]
    wincons: [2, 4]
    protection: [1, 3]
    synergy: 28

  aggro:               # aggro / go-wide
    lands: [33, 36]
    ramp: [7, 12]
    card_draw: [8, 11]
    removal: [6, 11]
    board_wipe: [1, 3]
    wincons: [0, 4]    # min 0 (2026-07-14): en aggro el ejército ES la wincon
    protection: [1, 3]
    synergy: 35

  control:             # control (puede llevar algo de prisión, pero el plan es interacción)
    lands: [36, 40]
    ramp: [10, 15]
    card_draw: [10, 14]
    removal: [10, 16]
    board_wipe: [4, 6]
    wincons: [1, 3]
    protection: [2, 4]
    synergy: 20

  spellslinger:
    lands: [34, 37]
    ramp: [8, 13]
    card_draw: [10, 14]
    removal: [8, 14]
    board_wipe: [2, 4]
    wincons: [2, 4]
    protection: [2, 4]
    synergy: 30

  voltron:             # la wincon es el comandante; equipos/auras viven en synergy
    lands: [34, 37]
    ramp: [8, 13]
    card_draw: [9, 12]
    removal: [7, 12]
    board_wipe: [1, 3]
    wincons: [0, 2]
    protection: [3, 6]  # proteger al comandante es el plan
    synergy: 30

  graveyard:           # motor de tumba
    lands: [34, 38]    # min bajado 2026-07-14: el suelo Karsten es quien debe mandar
    ramp: [8, 13]
    card_draw: [9, 13]
    removal: [7, 12]
    board_wipe: [2, 4]
    wincons: [2, 4]
    protection: [1, 3]
    synergy: 30

  enchantress:         # encantamientos-matter (Sythis); robo alto vía enchantresses
    lands: [34, 37]
    ramp: [8, 13]
    card_draw: [10, 14]
    removal: [8, 13]
    board_wipe: [2, 4]
    wincons: [1, 3]
    protection: [2, 4]
    synergy: 32

  lands_matter:
    lands: [38, 42]
    ramp: [12, 18]
    card_draw: [9, 12]
    removal: [6, 11]
    board_wipe: [2, 4]
    wincons: [2, 4]
    protection: [1, 3]
    synergy: 24    # Guille 2026-07-16: subido de 18. Con 18 el techo de sinergia
                   # expulsaba los propios payoffs de tierras (Scapeshift, Life from
                   # the Loam) para meter más tierras/rampa; con 24 caben.

  aristocrats:         # sacrificar criaturas/permanentes para valor + drenar; wincon = drenaje
    lands: [33, 37]
    ramp: [8, 13]
    card_draw: [9, 13]
    removal: [7, 12]
    board_wipe: [2, 4]
    wincons: [3, 5]
    protection: [1, 3]
    synergy: 33

  mill:                # moler la biblioteca rival; board_wipe bajo (mono-U no tiene barridos)
    lands: [35, 39]
    ramp: [9, 14]
    card_draw: [10, 14]
    removal: [7, 13]
    board_wipe: [1, 3]
    wincons: [2, 5]
    protection: [2, 4]
    synergy: 24

  big_mana:            # rampar durísimo a bombas vía vida/criaturas/devoción (no tierras)
    lands: [36, 40]
    ramp: [11, 17]
    card_draw: [9, 13]
    removal: [6, 11]
    board_wipe: [2, 4]
    wincons: [2, 5]
    protection: [2, 4]
    synergy: 22

  stax:                # prison/castigo. Es un arquetipo (Winter, Thalia+Gitrog): moldea
                       # el mazo por sus bandas, no por una categoría propia. La etiqueta
                       # de carta `stax` se probó y se retiró (2026-07-18): forzaba piezas
                       # de prisión flojas que el mazo no quería; las buenas ya entran por
                       # score en synergy. Cerca de control con menos wincons.
    lands: [35, 39]
    ramp: [10, 15]
    card_draw: [8, 12]
    removal: [8, 14]
    board_wipe: [2, 5]
    wincons: [1, 3]
    protection: [2, 4]
    synergy: 22
  artifacts:           # artefactos-matter: piezas baratas + payoffs; los mana
                       # rocks son la rampa (por eso ramp alto y tierras algo más
                       # bajas), robo alto vía artefactos, synergy holgado para el
                       # paquete de artefactos que no cae en categoría funcional.
    lands: [33, 38]
    ramp: [10, 16]
    card_draw: [9, 13]
    removal: [7, 12]
    board_wipe: [2, 4]
    wincons: [2, 4]
    protection: [1, 3]
    synergy: 34

# Diales de la UI: desplazan la banda resultante ±delta (low resta, high suma).
# `synergy` solo mueve el techo (el min queda fijo en 0). La posición central
# es el punto de partida y no lleva frase. Sin dial para `wincons` ni
# `protection`.
dials:
  lands:
    delta: 3
    low: "Mamá se llevó las tierras, qué caradura..."
    high: "¡MOZÁ! ¡TENGO TIERRAS!"
  ramp:
    delta: 3
    low: "курва (kurwa para los que no leen cirílico)"
    high: "It's raining lands! Hallelujah! It's raining lands!"
  card_draw:
    delta: 3
    low: "Topdicker"
    high: "Piggyhands"
  removal:
    delta: 3
    low: "Soy pecifista"
    high: "¡Voy a matar a Moe! Weeeee"
  board_wipe:
    delta: 2
    low: "Mi gente, tamo en japón. ¡Gente con cojone!"
    high: "50.000 people used to live here... now it's a ghost town."
  synergy:
    delta: 6
    low: "5C goodstuff"
    high: "Technologia!"

# Overrides por comandante (los añade Guille a mano). Pisa categorías sueltas,
# no el bloque entero. Formato:
#
#   "Krenko, Mob Boss":
#     archetype: aggro
#   "Atraxa, Praetors' Voice":
#     archetype: midrange
#     overrides:
#       card_draw: [10, 14]    # pisa solo esa categoría
#       synergy: 32            # techo: entero, como en los arquetipos
# Cobertura (2026-07-15): los 55 de featured_commanders.yaml. El resto del pool
# cae al default (midrange). Criterio: el plan de juego dominante REAL, medido
# por cómo gasta sus slots (que es lo que las bandas modelan), no por lo vistoso.
# Los marcados `# DUDOSO` los revisa Guille: tienen varios planes de juego
# reales (los que quedan sin resolver por falta de arquetipo ya tienen casa
# tras añadir aristocrats/mill/big_mana/stax el 2026-07-17).
commanders:
  # --- Mono / incoloro ---
  # OJO (2026-07-15, revisado 2026-07-16): `aggro` tiene techo de tierras 36.
  # Un mazo de curva alta en `aggro` NO se rompe (el fixpoint de Karsten sube el
  # techo de tierras solo), pero entonces la banda baja de tierras no manda nada
  # y la etiqueta `aggro` es cosmética. Regla: `aggro` solo para curvas bajas de
  # verdad (Krenko, Lathril, Edgar, Isshin, First Sliver, Giada...). Gishath y
  # Kaalia son curva alta (Karsten ~39): se quedan en midrange por mérito.
  # (El SelectorError que veía Giada era un falso positivo de la aserción
  # __debug__, arreglado; ver DECISIONS 2026-07-16.)
  "Giada, Font of Hope":
    archetype: aggro                 # Guille 2026-07-16: mono-blanco go-wide de tokens
                                     # de ángel, curva baja: aggro de verdad.
  "Urza, Lord High Artificer":
    archetype: artifacts             # Guille 2026-07-18: el comandante de artefactos
                                     # por antonomasia (Construct escalado, tap de
                                     # artefactos por maná). Movido de control.
  "Baral, Chief of Compliance":
    archetype: control               # DUDOSO: su premio solo salta al contrarrestar,
                                     # así que el mazo es contramagia (control). Si
                                     # Guille lo quiere storm/hechizos: spellslinger.
  "Talrand, Sky Summoner":
    archetype: spellslinger
    overrides:
      wincons: [0, 4]              # 2026-07-18: su wincon es el ejército de drakes
                                   # (el comandante); su pool B4 no trae carta-wincon.
  "Bruvac the Grandiloquent":
    archetype: mill                  # mill: dobla el molido rival; board_wipe bajo
                                     # (mono-U no tiene barridos que valgan).
  "Emry, Lurker of the Loch":
    archetype: artifacts             # Guille 2026-07-18: es un mazo de artefactos
                                     # (relanza artefactos, mill para alimentarlos),
                                     # no de tumba. Arquetipo artifacts creado hoy.
  "Sai, Master Thopterist":
    archetype: artifacts             # 2026-07-18: go-wide de thopters por cada
                                     # artefacto lanzado; sac outlet de artefactos.
  # Nombre canónico completo (regla de dos pasos): la app busca aquí por el
  # nombre del pool, así que un "Sephiroth, Fabled SOLDIER" a secas NO casaría
  # y caería al default en silencio. Ídem Etali y Kefka más abajo.
  "Sephiroth, Fabled SOLDIER // Sephiroth, One-Winged Angel":
    archetype: aristocrats           # aristocrats: sac outlets + drenaje.
  "K'rrik, Son of Yawgmoth":
    archetype: big_mana              # big_mana: paga vida por maná negro para
                                     # desplegar bombas mono-negras.
  "Krenko, Mob Boss":
    archetype: aggro
  "Azusa, Lost but Seeking":
    archetype: lands_matter
  "Lumra, Bellow of the Woods":
    archetype: lands_matter
    overrides:
      board_wipe: [1, 4]           # 2026-07-18: mono-G apenas barre; su pool B4 solo
                                   # trae Season of Gathering.
  "Titania, Protector of Argoth":
    archetype: lands_matter
  "Selvala, Heart of the Wilds":
    archetype: big_mana              # big_mana: rampa masiva vía criaturas grandes,
                                     # no vía tierras (lands_matter no le pega).
  "Zhulodok, Void Gorger":
    archetype: big_mana              # big_mana: Eldrazi colosales; rampa dura a
                                     # bombas con synergy holgado para el paquete.
  "Kona, Rescue Beastie":
    archetype: big_mana              # Guille 2026-07-18: mono-verde que trampea un
                                     # permanente/turno desde la mano si está tappeada;
                                     # rampa a bombas (suelo Karsten 40 -> solo big_mana
                                     # lo acomoda). Alt: midrange si lo quieres más plano.

  # --- Parejas ---
  "Grand Arbiter Augustin IV":
    archetype: control
  "Wilhelt, the Rotcleaver":
    archetype: aristocrats           # aristocrats: zombis que mueren para reciclarse
                                     # en cartas y drenaje.
    overrides:
      wincons: [0, 5]              # 2026-07-18: su matar es drenaje de paquete (Gray
                                   # Merchant, Diregraf) que la rúbrica archiva como
                                   # synergy a propósito; no hay carta-wincon en su pool.
  "Captain N'ghathrod":
    archetype: mill                  # mill: ataca para moler y roba lo molido del
                                     # cementerio rival.
  "Prosper, Tome-Bound":
    archetype: midrange
  "Olivia, Crimson Bride":
    archetype: graveyard
  "Osgir, the Reconstructor":
    archetype: artifacts             # 2026-07-18: recursión y doblado de artefactos
                                     # desde el cementerio; artefactos-matter puro.
  "Jhoira, Weatherlight Captain":
    archetype: artifacts             # 2026-07-18: motor de robo por históricos
                                     # (artefactos + leyendas); mazo artefacto-céntrico.
  "Etali, Primal Conqueror // Etali, Primal Sickness":
    archetype: midrange
    overrides:
      wincons: [1, 4]              # 2026-07-18: su wincon es su propia cara flip
                                   # (Primal Sickness, veneno); el pool trae 1 carta-wincon.
  "Minsc & Boo, Timeless Heroes":
    archetype: aggro
  "Sythis, Harvest's Hand":
    archetype: enchantress
  "Ketramose, the New Dawn":
    archetype: midrange              # DUDOSO: motor de robo por exilio; mazo de
                                     # desgaste. Alt: control.
  "Athreos, God of Passage":
    archetype: aristocrats           # aristocrats: sacrificar y recursión con castigo
                                     # de vida a la mesa.
  "The Locust God":
    archetype: spellslinger          # DUDOSO: robo masivo -> ejército de insectos.
                                     # Los slots son robo/wheels (spellslinger), pero
                                     # gana yendo ancho (aggro).
  "Niv-Mizzet, Parun":
    archetype: spellslinger
  "Lathril, Blade of the Elves":
    archetype: aggro
  "Meren of Clan Nel Toth":
    archetype: graveyard
  "Winota, Joiner of Forces":
    archetype: aggro
    overrides:
      card_draw: [4, 11]           # 2026-07-18: Winota no roba, trampea del library
                                   # (su trigger ES la ventaja); su pool trae 4 de robo.
  "Hakbal of the Surging Soul":
    archetype: aggro
  "Kinnan, Bonder Prodigy":
    archetype: midrange              # rampa de permanentes no-tierra: lands_matter no.
    overrides:
      board_wipe: [1, 5]           # 2026-07-18: Simic combo-ramp apenas barre; su
                                   # pool B4 solo trae Cyclonic Rift.
  "Aesi, Tyrant of Gyre Strait":
    archetype: lands_matter
  "Volo, Guide to Monsters":
    archetype: midrange

  # --- Tríos ---
  "Oloro, Ageless Ascetic":
    archetype: control
  "Zur the Enchanter":
    archetype: enchantress           # Guille 2026-07-16: Zur como motor de
                                     # encantamientos (tutoriza el paquete y controla),
                                     # no como criatura-bomba vestida de auras. On-theme:
                                     # ver la excepción de banlist para enchantress
                                     # (Rhystic/Remora/Smothering Tithe legales aquí).
  "Sydri, Galvanic Genius":
    archetype: artifacts             # 2026-07-18: anima artefactos como criaturas y
                                     # los usa de removal recurrente; artefactos-matter.
  "Kefka, Court Mage // Kefka, Ruler of Ruin":
    archetype: control               # DUDOSO: descarte simétrico + robo. Stax suave.
  "Obeka, Brute Chronologist":
    archetype: midrange              # caja de herramientas rara (terminar el turno);
                                     # sin arquetipo natural -> midrange generalista.
    overrides:
      wincons: [0, 4]                # Guille 2026-07-18: Obeka no lleva wincons
                                     # dedicados (su plan es la caja de "terminar el
                                     # turno"), así que su suelo baja a 0.
  "Korvold, Fae-Cursed King":
    archetype: aristocrats           # aristocrats: sacrifica permanentes propios
                                     # (tesoros) para robar y engordar.
  "Winter, Misanthropic Guide":
    archetype: stax                  # stax: prison + castigo de mano llena (el
                                     # delirium es medio, no el plan).
  "Gishath, Sun's Avatar":
    archetype: midrange              # DUDOSO: quiere atacar, pero es rampa + dinos de
                                     # 5-7 MV: suelo Karsten 38-39, no cabe en aggro.
  "Arcades, the Strategist":
    archetype: midrange              # DUDOSO: muros que roban; defensivo y luego ataca
                                     # con resistencia. Alt: control.
  "Thalia and The Gitrog Monster":
    archetype: stax                  # stax: castigo (impuestos de Thalia) + motor de
                                     # sacrificio de tierras del Gitrog.
  "Kykar, Wind's Fury":
    archetype: spellslinger
  "Narset, Enlightened Master":
    archetype: spellslinger          # sus slots son hechizos no criatura (spellslinger),
                                     # pero hay que protegerla para conectar.
    overrides:
      protection: [3, 5]             # Guille 2026-07-18: sube protección (de [2,4]);
                                     # el mazo depende de que Narset sobreviva y ataque.
  "Muldrotha, the Gravetide":
    archetype: graveyard
  "Glarb, Calamity's Augur":
    archetype: midrange              # DUDOSO: juega desde lo alto de la biblioteca,
                                     # no desde la tumba, pese al surveil.
  "Edgar Markov":
    archetype: aggro
  "Kaalia of the Vast":
    archetype: midrange              # DUDOSO: ataca para trampear gordos y pide
                                     # protección como un voltron, pero su curva
                                     # (suelo Karsten 39) tampoco cabe en aggro.
  "Isshin, Two Heavens as One":
    archetype: aggro
  "Flubs, the Fool":
    archetype: midrange              # DUDOSO: tierra extra apunta a lands_matter, pero
                                     # su premio real es vaciar la mano. Depende mucho
                                     # de la construcción.
  "Animar, Soul of Elements":
    archetype: midrange

  # --- 4 y 5 colores ---
  "Breya, Etherium Shaper":
    archetype: artifacts             # 2026-07-18: thopters + sac outlets de artefactos
                                     # para drenar/combear; artefactos-aristócratas,
                                     # pero el motor es el paquete de artefactos.
  "Omnath, Locus of Creation":
    archetype: lands_matter
  "The Ur-Dragon":
    archetype: midrange              # DUDOSO: tribal de dragones = rampa + ataque. Las
                                     # bandas de aggro (lands 33-36, ramp 7-12) matan
                                     # de hambre a un mazo de dragones de 5-7 MV;
                                     # midrange le da el maná pero le capa el paquete
                                     # tribal a 28.
  "Ulalek, Fused Atrocity":
    archetype: big_mana              # big_mana: mismo caso que Zhulodok (Eldrazi que
                                     # rampa a bombas y dobla hechizos/habilidades).
  "The First Sliver":
    archetype: aggro
